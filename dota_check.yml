name: Dota Watchlist Check

on:
  schedule:
    # รันทุก 30 นาที
    - cron: '*/30 * * * *'
  # รันด้วยตนเองได้
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # สำหรับ commit state.json กลับ

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-requests

      - name: Install dependencies
        run: pip install requests

      - name: Run Dota watchlist check
        env:
          MY_DOTA_ID:          ${{ secrets.MY_DOTA_ID }}
          LINE_CHANNEL_TOKEN:  ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:        ${{ secrets.LINE_USER_ID }}
        run: python check_dota.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json heroes_cache.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
